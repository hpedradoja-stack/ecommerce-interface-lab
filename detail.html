<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
</head>
<body>

<header>
    <h1>Smartphone</h1>
</header>

<section>
    <h2>Technical Specifications</h2>
    <table border="1">
        <tr>
            <th>Feature</th>
            <th>Details</th>
        </tr>
        <tr>
            <td>Screen Size</td>
            <td>6.5 inches</td>
        </tr>
        <tr>
            <td>Storage</td>
            <td>128GB</td>
        </tr>
    </table>
</section>

<section>
    <h2>Purchase</h2>
    <form>
        <label>Quantity:
            <input type="number" min="1" value="1">
        </label>
        <button type="submit">Add to Cart</button>
    </form>
</section>

<section>
    <h2>User Reviews</h2>
    <article>
        <blockquote>
            "Great phone with amazing battery life!"
        </blockquote>
        <p>- John D.</p>
    </article>
</section>

</body>
</html>
